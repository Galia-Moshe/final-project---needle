<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NYC Safe Transit Recommender</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body>

<header>
  <h1>NYC Safe Transit Recommender</h1>
  <span class="subtitle">New York City &mdash; Subway Route Finder</span>
</header>

<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <section class="panel">
      <h2>Find Route</h2>
      <form id="route-form">
        <label for="source-input">From</label>
        <input id="source-input" type="text"
               placeholder="e.g. Central Park, 350 5th Ave, JFK Airport…"
               required autocomplete="off">

        <label for="dest-input">To</label>
        <input id="dest-input" type="text"
               placeholder="e.g. Brooklyn Bridge, 200 Water St…"
               required autocomplete="off">

        <button type="submit" id="search-btn">Find Safe Route</button>
      </form>
      <div id="form-error" class="error-msg" style="display:none"></div>
    </section>

    <section class="panel" id="results-panel" style="display:none">
      <h2>Route</h2>
      <div id="route-cards"></div>
    </section>

    <section class="panel danger-admin">
      <h2>Danger Zones</h2>
      <p class="hint">Import a CSV file with unsafe area coordinates, or click the map to add a zone manually.</p>

      <label class="csv-upload-btn" title="CSV columns: lat, lng, name (optional), radius_km (optional)">
        Import CSV
        <input type="file" id="csv-upload" accept=".csv" style="display:none">
      </label>
      <div id="csv-status"></div>

      <div id="danger-zones-list"></div>
    </section>

  </aside>

  <!-- ── Map ── -->
  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="/static/js/map.js"></script>
<script src="/static/js/app.js"></script>
</body>
</html>
